<!DOCTYPE html>

<html lang="en">
    <head>
        <title></title>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1">
        <link href="./css/style.css" rel="stylesheet">
    </head>

    <body>
    
        <main class="terminal-window">
            <header class="terminal-header">
                <span class="buttons">
                    <span class="dot red"></span>
                    <span class="dot yellow"></span>
                    <span class="dot green"></span>
                </span>
                <div class="title">bash — 80x24</div>
            </header>

            <section class="content">
                <div class="command-line">
                    <span class="prompt">user@terminal:~$</span> <span class="typing">whoami</span>
                </div>
                
                <div class="response">
                    <h1>NOME_COGNOME</h1>
                    <p>> Full Stack Developer // Human Being</p>
                    <p>> Location: Earth.sys</p>
                </div>

                <div class="command-line">
                    <span class="prompt">user@terminal:~$</span> <span class="typing">ls ./progetti</span>
                </div>

                <div class="grid">
                    <div class="project-item">
                        <span class="dir">drwxr-xr-x</span>
                        <a href="#" class="file">progetto_01.exe</a>
                        <span class="desc">-- App di gestione dati</span>
                    </div>
                    <div class="project-item">
                        <span class="dir">drwxr-xr-x</span>
                        <a href="#" class="file">web_scraper.py</a>
                        <span class="desc">-- Tool di analisi automatica</span>
                    </div>
                </div>

                <div class="command-line cursor-line">
                    <span class="prompt">user@terminal:~$</span> <span class="cursor">_</span>
                </div>
            </section>
        </main>

    </body>
</html>
